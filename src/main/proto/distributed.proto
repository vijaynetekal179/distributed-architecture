syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.benchmark.distributed.grpc";
option java_outer_classname = "DistributedProto";

package distributed;

service DatabaseService {
    rpc PutRecord (PutRequest) returns (PutResponse);
    rpc GetRecord (GetRequest) returns (GetResponse);
}

service ApiService {
    rpc PutRecord (PutRequest) returns (PutResponse);
    rpc GetRecord (GetRequest) returns (GetResponse);
}

message PutRequest {
    string key = 1;
    string value = 2;
}

message PutResponse {
    bool success = 1;
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    bool found = 1;
    string value = 2;
}
